services:
  mcp-agent-log:
    build: .
    container_name: mcp_agent_log
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data

  discord-bot:
    build: .
    container_name: mcp_discord_bot
    restart: unless-stopped
    command: python discord_bot.py
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - mcp-agent-log

  nginx:
    image: nginx:alpine
    container_name: mcp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - mcp-agent-log
