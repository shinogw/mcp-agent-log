server {
    listen 80;

    location / {
        auth_basic           "MCP Agent Log";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass         http://mcp-agent-log:8600/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }
}
